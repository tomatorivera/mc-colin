services:
  postgres:
    image: postgres
    container_name: postgres-data
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
    volumes:
      - postgres-data:/var/lib/postgresql
    ports:
      - '5432:5432'
volumes:
  postgres-data:
    external: true
    name: postgres-data
